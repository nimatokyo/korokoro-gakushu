<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ころころ語学倶楽部</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#007AFF">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="ころころ語学倶楽部">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', sans-serif;
      background: #f2f2f7;
      color: #1d1d1f;
      min-height: 100vh;
    }

    header {
      background: #fff;
      padding: 14px 16px 10px;
      box-shadow: 0 1px 0 rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    h1 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }

    .tab-group {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 6px 14px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      background: #e5e5ea;
      color: #636366;
      transition: all 0.15s;
    }

    .tab.active-es   { background: #007AFF; color: #fff; }
    .tab.active-ko   { background: #FF3B30; color: #fff; }
    .tab.active-mode { background: #34C759; color: #fff; }

    .categories {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 16px;
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }

    .cat-btn {
      padding: 4px 12px;
      border: 1.5px solid #c7c7cc;
      border-radius: 12px;
      background: #fff;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      color: #3c3c43;
      transition: all 0.15s;
    }

    .cat-btn.active {
      background: #1d1d1f;
      color: #fff;
      border-color: #1d1d1f;
    }

    .stats-bar {
      display: flex;
      gap: 20px;
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #f2f2f7;
      font-size: 12px;
      color: #8e8e93;
      justify-content: center;
    }

    .stat { display: flex; align-items: center; gap: 4px; }
    .stat-val { font-weight: 700; color: #1d1d1f; }

    main {
      padding: 12px 14px;
      max-width: 720px;
      margin: 0 auto;
    }

    /* ── LIST VIEW ── */
    .cat-label {
      font-size: 11px;
      font-weight: 700;
      color: #8e8e93;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin: 14px 2px 4px;
    }

    .list-header {
      display: grid;
      padding: 0 14px;
      margin-bottom: 2px;
    }
    .list-header.es { grid-template-columns: 1.4fr 1fr 1fr; }
    .list-header.ko { grid-template-columns: 1.4fr 1fr 1fr; }

    .col-header {
      font-size: 10px;
      color: #aeaeb2;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .word-list { display: flex; flex-direction: column; gap: 5px; }

    .word-card {
      background: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      display: grid;
      gap: 4px 8px;
      align-items: start;
      box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    }

    .word-card.es { grid-template-columns: 1.4fr 1fr 1fr; }
    .word-card.ko { grid-template-columns: 1.4fr 1fr 1fr; }

    .wc-ja   { font-size: 13px; font-weight: 500; color: #1d1d1f; line-height: 1.4; }
    .wc-es   { font-size: 13px; font-weight: 700; color: #007AFF; line-height: 1.4; }
    .wc-en   { font-size: 12px; color: #8e8e93; line-height: 1.4; }
    .wc-ko   { font-size: 16px; font-weight: 700; color: #FF3B30; line-height: 1.3; }
    .wc-sub  { font-size: 11px; color: #5856D6; line-height: 1.4; margin-top: 1px; }
    .wc-roma { font-size: 10px; color: #aeaeb2; line-height: 1.3; }

    .speakable { cursor: pointer; text-decoration: underline dotted; text-underline-offset: 3px; }
    .speakable:active { opacity: 0.6; }

    /* ── FLASHCARD VIEW ── */
    .fc-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      padding-top: 16px;
    }

    .fc-progress { font-size: 13px; color: #8e8e93; }

    .flashcard {
      width: 100%;
      max-width: 420px;
      min-height: 220px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 28px 24px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.08s;
      text-align: center;
    }

    .flashcard:active { transform: scale(0.97); }

    .fc-q {
      font-size: 26px;
      font-weight: 700;
      line-height: 1.4;
    }

    .fc-tap-hint {
      font-size: 13px;
      color: #c7c7cc;
      margin-top: 20px;
    }

    .fc-answer { display: none; text-align: center; margin-top: 16px; width: 100%; }
    .flashcard.revealed .fc-tap-hint { display: none; }
    .flashcard.revealed .fc-answer { display: block; }

    .fc-divider {
      width: 36px; height: 2px;
      background: #e5e5ea;
      margin: 12px auto;
    }

    .fc-es   { font-size: 22px; font-weight: 800; color: #007AFF; margin-bottom: 4px; line-height: 1.4; }
    .fc-en   { font-size: 15px; color: #8e8e93; line-height: 1.4; }
    .fc-ko   { font-size: 26px; font-weight: 800; color: #FF3B30; line-height: 1.3; margin-bottom: 6px; }
    .fc-kata { font-size: 15px; color: #5856D6; margin-bottom: 4px; line-height: 1.4; }
    .fc-roma { font-size: 12px; color: #aeaeb2; }

    .fc-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.08s;
    }
    .btn:active { transform: scale(0.96); }
    .btn:hover  { opacity: 0.82; }
    .btn:disabled { opacity: 0.3; cursor: default; }

    .btn-prev    { background: #e5e5ea; color: #1d1d1f; }
    .btn-next    { background: #1d1d1f; color: #fff; }
    .btn-shuffle { background: #FF9500; color: #fff; }

    /* ── QUIZ VIEW ── */
    .quiz-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding-top: 16px;
    }

    .quiz-score { font-size: 13px; color: #8e8e93; }

    .quiz-card {
      width: 100%;
      max-width: 440px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
      padding: 24px 20px 20px;
    }

    .quiz-q {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .quiz-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .quiz-opt {
      padding: 12px 8px;
      border: 2px solid #e5e5ea;
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      text-align: center;
      font-weight: 600;
      transition: border-color 0.12s;
      line-height: 1.3;
    }

    .quiz-opt small { display: block; font-size: 10px; font-weight: 400; color: #aeaeb2; margin-top: 2px; }
    .quiz-opt:hover { border-color: #aeaeb2; }
    .quiz-opt.correct { border-color: #34C759; background: #f0fff4; color: #1c7a38; }
    .quiz-opt.wrong   { border-color: #FF3B30; background: #fff0f0; color: #c0160f; }
    .quiz-opt.answered { cursor: default; }

    .quiz-result {
      font-size: 18px;
      font-weight: 700;
      text-align: center;
      min-height: 24px;
    }

    @media (max-width: 400px) {
      .quiz-options { grid-template-columns: 1fr; }
      .fc-q { font-size: 20px; }
      .fc-es, .fc-ko { font-size: 18px; }
    }
  </style>
</head>
<body>
<header>

</div>

<main id="main"></main>

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const ST = {
  lang: 'es', mode: 'list', cat: 'すべて',
  fcItems: [], fcIdx: 0, fcRevealed: false,
  qzItems: [], qzIdx: 0, qzAnswered: false,
  correct: 0, wrong: 0,
};

function loadStats() {
  try { const s = JSON.parse(localStorage.getItem('lc-stats') || '{}'); ST.correct = s.correct||0; ST.wrong = s.wrong||0; } catch(e) {}
}
function saveStats() {
  localStorage.setItem('lc-stats', JSON.stringify({ correct: ST.correct, wrong: ST.wrong }));
}

// ══════════════════════════════════════════
//  TTS
// ══════════════════════════════════════════
function speak(text, lang) {
  if (!('speechSynthesis' in window)) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = lang;
  u.rate = 0.9;
  speechSynthesis.speak(u);
}
function speakItem(item) {
  if (ST.lang === 'es') speak(item.es, 'es-ES');
  else speak(item.ko, 'ko-KR');
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function filtered() {
  const items = DATA[ST.lang];
  return ST.cat === 'すべて' ? items : items.filter(i => i.cat === ST.cat);
}
function cats() {
  return ['すべて', ...new Set(DATA[ST.lang].map(i => i.cat))];
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}

// ══════════════════════════════════════════
//  RENDER: shared
// ══════════════════════════════════════════
function renderAll() {
  renderLangTabs(); renderModeTabs(); renderCats(); renderStats();
  if (ST.mode==='list')  renderList();
  if (ST.mode==='flash') renderFlash();
  if (ST.mode==='quiz')  renderQuiz();
}
function renderLangTabs() {
  document.querySelectorAll('#langTabs .tab').forEach(t => {
    t.className = 'tab' + (t.dataset.lang===ST.lang ? ` active-${ST.lang}` : '');
  });
}
function renderModeTabs() {
  document.querySelectorAll('#modeTabs .tab').forEach(t => {
    t.className = 'tab' + (t.dataset.mode===ST.mode ? ' active-mode' : '');
  });
}
function renderCats() {
  document.getElementById('categories').innerHTML = cats().map(c =>
    `<button class="cat-btn${c===ST.cat?' active':''}" data-cat="${c}">${c}</button>`
  ).join('');
}
function renderStats() {
  const bar = document.getElementById('statsBar');
  bar.style.display = ST.mode==='list' ? 'none' : 'flex';
  document.getElementById('sCorrect').textContent = ST.correct;
  document.getElementById('sWrong').textContent   = ST.wrong;
  const t = ST.correct+ST.wrong;
  document.getElementById('sRate').textContent = t ? Math.round(ST.correct/t*100)+'%' : '—';
}

// ══════════════════════════════════════════
//  RENDER: LIST
// ══════════════════════════════════════════
function renderList() {
  const items = filtered();
  const isEs = ST.lang === 'es';
  let html = '';

  if (isEs) {
    html += `<div class="list-header es">
      <span class="col-header">日本語</span>
      <span class="col-header">Español</span>
      <span class="col-header">English</span>
    </div>`;
  } else {
    html += `<div class="list-header ko">
      <span class="col-header">日本語</span>
      <span class="col-header">한국어</span>
      <span class="col-header">読み / Roma</span>
    </div>`;
  }

  html += '<div class="word-list">';
  let lastCat = '';
  for (const item of items) {
    if (item.cat !== lastCat) {
      lastCat = item.cat;
      html += `<div class="cat-label">${item.cat}</div>`;
    }
    if (isEs) {
      html += `<div class="word-card es">
        <span class="wc-ja">${item.ja}</span>
        <span class="wc-es speakable" data-speak="${item.es}" data-speak-lang="es-ES">${item.es}</span>
        <span class="wc-en">${item.en}</span>
      </div>`;
    } else {
      const isJamo = item.cat.startsWith('ハングル');
      const speakText = isJamo ? item.kata : item.ko;
      const speakLang = isJamo ? 'ja-JP' : 'ko-KR';
      html += `<div class="word-card ko">
        <span class="wc-ja">${item.ja}</span>
        <span class="wc-ko speakable" data-speak="${speakText}" data-speak-lang="${speakLang}">${item.ko}</span>
        <div><span class="wc-sub">${item.kata}</span><br><span class="wc-roma">${item.roma}</span></div>
      </div>`;
    }
  }
  html += '</div>';
  document.getElementById('main').innerHTML = html;
}

// ══════════════════════════════════════════
//  RENDER: FLASHCARD
// ══════════════════════════════════════════
function renderFlash() {
  const items = ST.fcItems;
  if (!items.length) { document.getElementById('main').innerHTML = '<p style="text-align:center;color:#8e8e93;padding:40px">カードがありません</p>'; return; }

  const item = items[ST.fcIdx];
  const isEs = ST.lang === 'es';
  const rev  = ST.fcRevealed;

  let ansHtml = '';
  if (isEs) {
    ansHtml = `<div class="fc-es speakable" data-speak="${item.es}" data-speak-lang="es-ES">${item.es}</div><div class="fc-divider"></div><div class="fc-en">${item.en}</div>`;
  } else {
    ansHtml = `<div class="fc-ko speakable" data-speak="${item.ko}" data-speak-lang="ko-KR">${item.ko}</div><div class="fc-kata">${item.kata}</div><div class="fc-roma">${item.roma}</div>`;
  }

  document.getElementById('main').innerHTML = `
    <div class="fc-wrap">
      <div class="fc-progress">${ST.fcIdx+1} / ${items.length}</div>
      <div class="flashcard${rev?' revealed':''}" id="fc">
        <div class="fc-q">${item.ja}</div>
        <div class="fc-tap-hint">タップして答えを表示</div>
        <div class="fc-answer">${ansHtml}</div>
      </div>
      <div class="fc-nav">
        <button class="btn btn-prev" id="fcPrev" ${ST.fcIdx===0?'disabled':''}>← 前</button>
        <button class="btn btn-shuffle" id="fcShuffle">シャッフル</button>
        <button class="btn btn-next" id="fcNext">${ST.fcIdx===items.length-1?'最初へ':'次 →'}</button>
      </div>
    </div>`;

  document.getElementById('fc').addEventListener('click', () => { ST.fcRevealed=!ST.fcRevealed; renderFlash(); if (ST.fcRevealed) speakItem(ST.fcItems[ST.fcIdx]); });
  document.getElementById('fcPrev').addEventListener('click', e => { e.stopPropagation(); if(ST.fcIdx>0){ST.fcIdx--;ST.fcRevealed=false;renderFlash();} });
  document.getElementById('fcNext').addEventListener('click', e => { e.stopPropagation(); ST.fcIdx=ST.fcIdx<items.length-1?ST.fcIdx+1:0; ST.fcRevealed=false; renderFlash(); });
  document.getElementById('fcShuffle').addEventListener('click', e => { e.stopPropagation(); ST.fcItems=shuffle(filtered()); ST.fcIdx=0; ST.fcRevealed=false; renderFlash(); });
}

// ══════════════════════════════════════════
//  RENDER: QUIZ
// ══════════════════════════════════════════
function renderQuiz() {
  const items = ST.qzItems;
  const allItems = DATA[ST.lang];
  if (items.length < 4) { document.getElementById('main').innerHTML = '<p style="text-align:center;color:#8e8e93;padding:40px">クイズには4問以上必要です</p>'; return; }

  const item  = items[ST.qzIdx % items.length];
  const isEs  = ST.lang === 'es';
  const wrong = shuffle(allItems.filter(i => i!==item)).slice(0,3);
  const opts  = shuffle([item,...wrong]);

  const optHtml = opts.map((o,i) => {
    const label = isEs ? o.es : o.ko;
    const sub   = isEs ? o.en : o.kata;
    return `<button class="quiz-opt" data-i="${i}" data-ok="${o===item}">${label}<small>${sub}</small></button>`;
  }).join('');

  document.getElementById('main').innerHTML = `
    <div class="quiz-wrap">
      <div class="quiz-score">正解 ${ST.correct} / ${ST.correct+ST.wrong} 問</div>
      <div class="quiz-card">
        <div class="quiz-q">${item.ja}</div>
        <div class="quiz-options">${optHtml}</div>
      </div>
      <div class="quiz-result" id="qzResult"></div>
    </div>`;

  document.querySelectorAll('.quiz-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      if (ST.qzAnswered) return;
      ST.qzAnswered = true;
      const ok = btn.dataset.ok === 'true';
      btn.classList.add(ok ? 'correct' : 'wrong', 'answered');
      if (!ok) document.querySelectorAll('.quiz-opt').forEach(b => { if(b.dataset.ok==='true') b.classList.add('correct'); b.classList.add('answered'); });
      if (ok) ST.correct++; else ST.wrong++;
      saveStats(); renderStats();
      speakItem(item);
      const res = document.getElementById('qzResult');
      res.textContent = ok ? '⭕ 正解！' : '❌ 不正解';
      res.style.color = ok ? '#34C759' : '#FF3B30';
      setTimeout(() => { ST.qzIdx++; ST.qzAnswered=false; renderQuiz(); }, 1400);
    });
  });
}

//  EVENTS
// ══════════════════════════════════════════
function resetCards() {
  ST.fcItems=shuffle(filtered()); ST.fcIdx=0; ST.fcRevealed=false;
  ST.qzItems=shuffle(filtered()); ST.qzIdx=0; ST.qzAnswered=false;
}
document.getElementById('langTabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-lang]'); if(!btn) return;
  ST.lang=btn.dataset.lang; ST.cat='すべて'; resetCards(); renderAll();
});
document.getElementById('modeTabs').addEventListener('click', e => {
  const btn = e.target.closest('[data-mode]'); if(!btn) return;
  ST.mode=btn.dataset.mode; resetCards(); renderAll();
});
document.getElementById('categories').addEventListener('click', e => {
  const btn = e.target.closest('[data-cat]'); if(!btn) return;
  ST.cat=btn.dataset.cat; resetCards(); renderAll();
});
document.getElementById('main').addEventListener('click', e => {
  const el = e.target.closest('[data-speak]'); if(!el) return;
  e.stopPropagation();
  speak(el.dataset.speak, el.dataset.speakLang);
});

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
loadStats();
resetCards();
renderAll();
</script>

}
